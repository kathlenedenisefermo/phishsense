name: phishsense
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  permission_handler: ^11.3.1
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.2.6
  image_picker: ^1.1.2
  http: ^1.2.0         # ← added for API calls
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/phishsense_model.onnx
    - assets/tokenizer.json
    - assets/label_map.json
    - assets/images/phishsense_logo.png
    - assets/images/icon.png
    - assets/images/welcome.png
    
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
